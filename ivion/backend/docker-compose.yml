services:
  mysql:
    image: mysql:8.4
    container_name: ivion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ivion_root
      MYSQL_DATABASE: iviondb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/iviondb.sql:/docker-entrypoint-initdb.d/iviondb.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pivion_root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./ivion
      dockerfile: Dockerfile
    container_name: ivion-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/iviondb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ivion_root
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: