spring.application.name=ivion

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iviondb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=8080

jwt.secret=${JWT_SECRET:ivionJWTSecretKey2026ChangeThisInProduction!!}
jwt.expiration=86400000
