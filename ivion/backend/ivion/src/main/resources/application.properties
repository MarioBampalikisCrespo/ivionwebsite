spring.application.name=ivion

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iviondb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ivion_root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:${SERVER_PORT:8081}}

jwt.secret=${JWT_SECRET:ivionJWTSecretKey2026ChangeThisInProduction!!}
jwt.expiration=86400000

cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000}
