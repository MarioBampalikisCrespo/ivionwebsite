spring.application.name=ivion

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iviondb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ivion_root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update: auto-creates/updates missing columns and tables in dev
# In production, run migration.sql manually and switch to validate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:${SERVER_PORT:8081}}

# JWT — set JWT_SECRET env var in production (min 32 chars, random 64+ recommended)
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:dev-only-secret-must-be-overridden-in-production}
jwt.expiration=86400000

cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000}

# Redis — used for JWT blacklist on logout
# If Redis is not running locally, blacklist is disabled (fail-open) — login/register still work
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.connect-timeout=2000ms
spring.data.redis.timeout=1000ms

# Disable Redis health check so the app starts even without Redis in local dev
management.health.redis.enabled=false

# Async thread pool for audit logging
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
